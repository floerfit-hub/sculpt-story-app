<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Floer FitTrack</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitTrack" />
    <link rel="apple-touch-icon" href="/sculpt-story-app/pwa-icon-192.png" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="description" content="У цьому додатки ви зможете повністю бачити свій прогрес та розраховувати калорійність для своєї цілі">
    <script>
      // Single Page Apps for GitHub Pages
      // Redirect all 404s to index.html with the path stored in a query parameter
      var pathSegmentsToKeep = 1; // Keep '/sculpt-story-app/' prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>

  </body>
</html>
